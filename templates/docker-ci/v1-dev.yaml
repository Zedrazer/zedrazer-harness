template:
  name: docker-ci
  identifier: dockerci
  versionLabel: v1-dev
  type: Stage
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  spec:
    type: CI
    spec:
      cloneCodebase: true
      caching:
        enabled: false
        override: true
        paths: []
      buildIntelligence:
        enabled: false
      infrastructure:
        type: KubernetesDirect
        spec:
          connectorRef: zedrazer
          namespace: harness-delegates
          automountServiceAccountToken: true
          nodeSelector: {}
          os: Linux
      execution:
        steps:
          - step:
              type: Background
              name: dind
              identifier: dind
              spec:
                connectorRef: Dockerhub
                image: docker:dind
                shell: Sh
                privileged: true
          - step:
              type: Run
              name: docker-build
              identifier: dockerbuild
              spec:
                connectorRef: Dockerhub
                image: zedrazer/harness-docker-builder:1.0.0
                shell: Sh
                command: docker build -t zedrazer/<+stage.variables.docker_image_name>:<+stage.variables.docker_image_tag> .
          - step:
              type: Run
              name: docker-scan
              identifier: dockerscan
              spec:
                connectorRef: Dockerhub
                image: zedrazer/harness-docker-builder:1.0.0
                shell: Sh
                command: trivy image --exit-code 1 --severity HIGH,CRITICAL zedrazer/<+stage.variables.docker_image_name>:<+stage.variables.docker_image_tag>
      sharedPaths:
        - /var/run
    variables:
      - name: docker_image_name
        type: String
        description: ""
        required: true
        value: <+input>
      - name: docker_image_tag
        type: String
        description: ""
        required: true
        value: <+input>
