template:
  name: terraform-ci
  identifier: terraformci
  versionLabel: v1.0.0
  type: Stage
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  spec:
    type: CI
    variables:
      - name: terraformVersion
        type: String
        value: <+input>.default("1.14")
      - name: workingDirectory
        type: String
        value: <+input>.default(".")
    spec:
      cloneCodebase: true
      caching:
        enabled: true
        override: true
      buildIntelligence:
        enabled: true
      infrastructure:
        type: KubernetesDirect
        spec:
          connectorRef: zedrazer
          namespace: harness-delegates
          automountServiceAccountToken: true
          nodeSelector: {}
          os: Linux
      execution:
        steps:
          - step:
              type: Run
              name: terraform-fmt
              identifier: terraformfmt
              spec:
                connectorRef: Dockerhub
                image: <+"hashicorp/terraform:" + <+stage.variables.terraformVersion>>
                shell: Sh
                command: |-
                  set -euo pipefail
                  cd "<+stage.variables.workingDirectory>"
                  terraform fmt -check -recursive -diff
              description: Format the terraform using native terraform command
    sendGitStatus:
      enabled: false
      name: ""
