template:
  name: terraform-ci-core
  identifier: terraformcicore
  versionLabel: v1.0.1
  isStable: true
  type: Stage
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  spec:
    type: CI
    inputs:
      - name: terraformVersion
        type: String
        default: "1.14"
      - name: workingDirectory
        type: String
        default: "."
    spec:
      cloneCodebase: true
      caching:
        enabled: true
        override: true
      buildIntelligence:
        enabled: true
      infrastructure:
        type: KubernetesDirect
        spec:
          connectorRef: zedrazer
          namespace: harness-delegates
          automountServiceAccountToken: true
          nodeSelector: {}
          os: Linux
      execution:
        steps:
          - step:
              type: Run
              name: terraform-fmt
              identifier: terraformfmt
              spec:
                connectorRef: Dockerhub
                image: <+"hashicorp/terraform:" + <+inputs.terraformVersion>>
                shell: Sh
                command: |-
                  set -euo pipefail
                  cd "<+inputs.workingDirectory>"
                  terraform fmt -check -recursive -diff
              description: Format the terraform using native terraform command
    sendGitStatus:
      enabled: false
      name: ""
