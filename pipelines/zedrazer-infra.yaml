pipeline:
  name: zedrazer-infra
  identifier: zedrazerinfra
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: zedrazergh
        repoName: zedrazer-log-forward-infrastructure
        build: <+input>
  stages:
    - stage:
        name: terraform-ci
        identifier: terraformci
        template:
          templateRef: terraformci
          versionLabel: v1-dev
          templateInputs:
            type: CI
            variables:
              - name: runner_image_version
                type: String
                value: <+input>.default(1.14.6)
              - name: working_dir
                type: String
                value: <+input>.default(.)
    - stage:
        name: Plan Approval
        identifier: Plan_Approval
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Plan Approval
                  identifier: Plan_Approval
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Please review the following information
                      and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                    isAutoRejectEnabled: false
                    approverInputs: []
        tags: {}
